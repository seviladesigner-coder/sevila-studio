<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevila Creative Studio — Tudo sobre o nosso projeto em um só lugar</title>
<!-- Tipografia: Inter (corpo) + Sora (display/números) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Gráficos -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ============================================================
   SEVILA CREATIVE STUDIO — Design tokens
   Paleta: roxo profundo + branco lavanda, glow em violeta
   ============================================================ */
:root{
  --bg:#F6F4FB;            /* fundo geral (branco-lavanda) */
  --card:#FFFFFF;          /* cartões */
  --ink:#17102B;           /* texto principal */
  --muted:#6E6588;         /* texto secundário */
  --line:#E9E4F5;          /* bordas sutis */
  --violet:#6C2BD9;        /* roxo primário */
  --violet-2:#8B5CF6;      /* roxo claro */
  --violet-deep:#160B33;   /* roxo quase-preto (sidebar/login) */
  --fuchsia:#D946EF;
  --ok:#10B981;
  --warn:#F59E0B;
  --r:14px;                /* raio padrão 12–16px */
  --shadow:0 10px 30px -12px rgba(23,16,43,.14);
  --glow:0 0 0 1px rgba(139,92,246,.35), 0 0 26px rgba(139,92,246,.30);
  --font-body:'Inter',system-ui,sans-serif;
  --font-display:'Sora','Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
::selection{background:rgba(139,92,246,.25)}

/* ---------- Animações de entrada ---------- */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.rise{animation:rise .5s cubic-bezier(.22,.9,.3,1) both}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* ============================================================
   LOGIN (assinatura visual: aurora de glow violeta)
   ============================================================ */
#loginScreen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1200px 600px at 20% -10%,rgba(139,92,246,.35),transparent 60%),
             radial-gradient(900px 500px at 110% 110%,rgba(217,70,239,.22),transparent 60%),
             var(--violet-deep);overflow:hidden;padding:20px}
#loginScreen .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none}
#loginScreen .orb.a{width:420px;height:420px;background:#6C2BD9;top:-140px;left:-120px}
#loginScreen .orb.b{width:340px;height:340px;background:#D946EF;bottom:-120px;right:-80px;opacity:.35}
.login-card{position:relative;width:min(420px,100%);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(18px);border-radius:20px;padding:38px 34px;color:#fff;box-shadow:0 30px 80px -20px rgba(0,0,0,.6);animation:pop .55s cubic-bezier(.22,.9,.3,1) both}
.login-card .logo{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-.02em}
.login-card .logo em{font-style:normal;background:linear-gradient(90deg,#B794F6,#E9D8FD);-webkit-background-clip:text;background-clip:text;color:transparent}
.login-card p.sub{color:rgba(255,255,255,.65);font-size:13.5px;margin:8px 0 26px;line-height:1.5}
.login-tabs{display:flex;gap:6px;background:rgba(255,255,255,.08);padding:5px;border-radius:12px;margin-bottom:22px}
.login-tabs button{flex:1;border:0;background:transparent;color:rgba(255,255,255,.7);padding:9px 0;border-radius:9px;font-size:13px;font-weight:600;transition:all .2s}
.login-tabs button.active{background:#fff;color:var(--violet-deep);box-shadow:var(--glow)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:7px}
.field input,.field select{width:100%;padding:12px 14px;border-radius:11px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.09);color:#fff;outline:none;transition:border .2s,box-shadow .2s}
.field select option{color:var(--ink)}
.field input::placeholder{color:rgba(255,255,255,.35)}
.field input:focus,.field select:focus{border-color:var(--violet-2);box-shadow:0 0 0 3px rgba(139,92,246,.3)}
.btn-primary{width:100%;padding:13px;border:0;border-radius:11px;font-weight:700;font-size:14px;color:#fff;
  background:linear-gradient(135deg,#7C3AED,#A855F7);box-shadow:0 8px 24px -6px rgba(124,58,237,.7);transition:transform .15s,box-shadow .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 30px -6px rgba(124,58,237,.85)}
.login-err{color:#FCA5A5;font-size:12.5px;margin-top:12px;min-height:16px;text-align:center}
.login-hint{margin-top:18px;padding:12px;border-radius:10px;background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.3);font-size:12px;color:rgba(255,255,255,.75);line-height:1.55}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:none;min-height:100vh}
#app.on{display:grid;grid-template-columns:248px 1fr}
aside.sidebar{background:linear-gradient(180deg,#1B0E3E 0%,#160B33 60%,#1E0F45 100%);color:#fff;padding:26px 18px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.sidebar .brand{font-family:var(--font-display);font-weight:800;font-size:18px;padding:0 10px 22px;letter-spacing:-.02em}
.sidebar .brand em{font-style:normal;color:#C4B5FD}
.sidebar .client-chip{margin:0 6px 20px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
.sidebar .client-chip .nm{font-weight:700;font-size:14px}
.sidebar .client-chip .hd{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.nav-btn{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;color:rgba(255,255,255,.62);
  padding:11px 13px;border-radius:11px;font-size:13.5px;font-weight:600;transition:all .18s;text-align:left}
.nav-btn svg{width:17px;height:17px;flex:none}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-btn.active{color:#fff;background:linear-gradient(90deg,rgba(124,58,237,.55),rgba(124,58,237,.18));box-shadow:inset 0 0 0 1px rgba(167,139,250,.35),0 0 18px rgba(124,58,237,.35)}
.sidebar .spacer{flex:1}
.sidebar .foot-btn{font-size:12.5px}

main{padding:34px 42px 60px;max-width:1220px;width:100%;margin:0 auto}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:28px}
.topbar h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em}
.topbar .crumb{font-size:12.5px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:11px;padding:4px;box-shadow:var(--shadow)}
.seg button{border:0;background:transparent;padding:8px 15px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);transition:all .18s}
.seg button.active{background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;box-shadow:0 4px 14px -4px rgba(124,58,237,.6)}

/* ---------- Cards ---------- */
.grid{display:grid;gap:20px}
.grid.kpis{grid-template-columns:repeat(auto-fit,minmax(215px,1fr));margin-bottom:24px}
.grid.two{grid-template-columns:1.4fr 1fr}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .25s}
.card.hoverable:hover{transform:translateY(-3px);box-shadow:0 18px 40px -14px rgba(108,43,217,.25)}
.card h3{font-size:14.5px;font-weight:700;margin-bottom:2px}
.card .sub{font-size:12.5px;color:var(--muted)}
.kpi .lbl{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.kpi .val{font-family:var(--font-display);font-size:32px;font-weight:800;letter-spacing:-.03em;margin:8px 0 4px}
.kpi .delta{font-size:12.5px;font-weight:600}
.kpi .delta.up{color:var(--ok)}.kpi .delta.down{color:#EF4444}.kpi .delta.flat{color:var(--muted)}
.kpi .ring{float:right;width:56px;height:56px}
.progress{height:8px;border-radius:99px;background:#EFEAFB;overflow:hidden;margin-top:12px}
.progress i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#7C3AED,#D946EF);box-shadow:0 0 12px rgba(168,85,247,.6);transition:width .8s cubic-bezier(.22,.9,.3,1)}
.chart-box{position:relative;height:250px;margin-top:14px}
.insight{margin-top:14px;padding:11px 13px;border-radius:10px;background:linear-gradient(135deg,#F5F0FF,#FBF7FF);border:1px solid #EBDFFE;font-size:12.8px;color:#4C3480;line-height:1.5}
.insight b{color:var(--violet)}

/* ---------- Calendário ---------- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.cal-head h2{font-family:var(--font-display);font-size:19px;font-weight:700;text-transform:capitalize}
.cal-nav{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:16px;display:grid;place-items:center;transition:all .15s}
.icon-btn:hover{border-color:var(--violet-2);color:var(--violet);box-shadow:0 0 12px rgba(139,92,246,.25)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.cal-dow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:center;padding:6px 0}
.cal-cell{min-height:104px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px;display:flex;flex-direction:column;gap:5px;transition:all .18s}
.cal-cell.out{opacity:.38;background:transparent}
.cal-cell:hover{border-color:#CDB6F7;box-shadow:0 6px 18px -8px rgba(108,43,217,.3)}
.cal-cell .d{font-size:12px;font-weight:700;color:var(--muted)}
.cal-cell.today .d{color:#fff;background:linear-gradient(135deg,#7C3AED,#A855F7);width:22px;height:22px;border-radius:8px;display:grid;place-items:center;box-shadow:0 0 12px rgba(139,92,246,.55)}
.pill{font-size:11px;font-weight:600;padding:4px 8px;border-radius:7px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;line-height:1.25;transition:transform .12s}
.pill:hover{transform:scale(1.03)}
.pill .st{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.95);flex:none}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.legend i{width:10px;height:10px;border-radius:4px;display:inline-block}

/* ---------- Análise ---------- */
.an-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
.an-card .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.an-card .score{font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--violet)}
.badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px}
.badge.alta{background:#FEE2E2;color:#B91C1C}.badge.media{background:#FEF3C7;color:#92400E}.badge.baixa{background:#D1FAE5;color:#065F46}
.an-card p.txt{font-size:13px;color:var(--muted);line-height:1.6;margin-top:10px}

/* ---------- Relatório / tabelas ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
td{padding:12px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .15s}
tbody tr:hover{background:#FAF7FF}
td.num{font-variant-numeric:tabular-nums;font-weight:600}

/* ---------- Botões / util ---------- */
.btn{border:0;border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;transition:all .18s}
.btn.violet{background:linear-gradient(135deg,#7C3AED,#A855F7);color:#fff;box-shadow:0 6px 18px -6px rgba(124,58,237,.6)}
.btn.violet:hover{transform:translateY(-1px)}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn.ghost:hover{border-color:var(--violet-2);color:var(--violet)}
.btn.danger{background:#FEE2E2;color:#B91C1C}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:8px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mt{margin-top:18px}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:13.5px;line-height:1.6}
.tag-admin{font-size:10.5px;font-weight:800;letter-spacing:.08em;background:linear-gradient(135deg,#7C3AED,#D946EF);color:#fff;padding:4px 9px;border-radius:99px;box-shadow:0 0 14px rgba(168,85,247,.5)}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(23,16,43,.55);backdrop-filter:blur(4px);z-index:90;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{width:min(560px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:18px;padding:28px;box-shadow:0 40px 90px -20px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.22,.9,.3,1) both}
.modal h3{font-family:var(--font-display);font-size:18px;margin-bottom:18px}
.modal .field label{color:var(--muted)}
.modal .field input,.modal .field select,.modal .field textarea{background:#FAF8FE;border:1px solid var(--line);color:var(--ink)}
.modal .field textarea{width:100%;min-height:84px;padding:12px 14px;border-radius:11px;resize:vertical;outline:none}
.modal .field textarea:focus{border-color:var(--violet-2);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}

/* ---------- Footer ---------- */
footer{margin-top:46px;text-align:center;font-size:12px;color:#A79FC0}

/* ---------- Responsivo ---------- */
@media(max-width:960px){
  #app.on{grid-template-columns:1fr}
  aside.sidebar{position:fixed;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;align-items:center;padding:10px 12px;z-index:80;overflow-x:auto}
  .sidebar .brand,.sidebar .client-chip,.sidebar .spacer{display:none}
  .nav-btn span{display:none}
  main{padding:22px 18px 110px}
  .grid.two{grid-template-columns:1fr}
  .cal-cell{min-height:74px}
  .form-2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ============================================================
     TELA DE LOGIN
     ============================================================ -->
<div id="loginScreen">
  <div class="orb a"></div><div class="orb b"></div>
  <div class="login-card">
    <div class="logo">Sevila <em>Creative Studio</em></div>
    <p class="sub">Tudo sobre o nosso projeto em um só lugar.</p>
    <div class="login-tabs">
      <button id="tabAdmin" class="active" onclick="switchLoginTab('admin')">Sou da agência</button>
      <button id="tabClient" onclick="switchLoginTab('client')">Sou cliente</button>
    </div>
    <div id="loginAdmin">
      <div class="field"><label>Senha de administrador</label>
        <input type="password" id="admPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
      <button class="btn-primary" onclick="doAdminLogin()">Entrar como agência</button>
    </div>
    <div id="loginClient" style="display:none">
      <div class="field"><label>Selecione seu perfil</label><select id="clientSel"></select></div>
      <div class="field"><label>Código de acesso</label>
        <input type="password" id="clientCode" placeholder="Código enviado pela agência" onkeydown="if(event.key==='Enter')doClientLogin()"></div>
      <button class="btn-primary" onclick="doClientLogin()">Acessar meu dashboard</button>
    </div>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ============================================================
     APP
     ============================================================ -->
<div id="app">
  <aside class="sidebar">
    <div class="brand">Sevila <em>Studio</em></div>
    <div class="client-chip"><div class="nm" id="sbClientName">—</div><div class="hd" id="sbClientHandle">—</div></div>
    <button class="nav-btn active" data-view="dash" onclick="go('dash')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span>Dashboard</span></button>
    <button class="nav-btn" data-view="cal" onclick="go('cal')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M8 2v4M16 2v4M3 9h18"/></svg><span>Calendário editorial</span></button>
    <button class="nav-btn" data-view="an" onclick="go('an')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-6.5 8-6.5s8 2.5 8 6.5"/></svg><span>Análise do perfil</span></button>
    <button class="nav-btn" data-view="rep" onclick="go('rep')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><span>Relatório mensal</span></button>
    <button class="nav-btn adminOnly" data-view="cli" onclick="go('cli')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.5"/><circle cx="17" cy="9" r="2.6"/><path d="M2.5 20c0-3.5 3-5.5 6.5-5.5s6.5 2 6.5 5.5M16 15.2c2.9.3 5.5 2 5.5 4.8"/></svg><span>Clientes</span></button>
    <button class="nav-btn adminOnly" data-view="cfg" onclick="go('cfg')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.15-1.4l2.1-1.6-2-3.4-2.4 1a7 7 0 0 0-2.4-1.4L13.7 2h-3.4l-.45 2.6a7 7 0 0 0-2.4 1.4l-2.4-1-2 3.4 2.1 1.6A7 7 0 0 0 5 12c0 .5.05.95.15 1.4l-2.1 1.6 2 3.4 2.4-1a7 7 0 0 0 2.4 1.4l.45 2.6h3.4l.45-2.6a7 7 0 0 0 2.4-1.4l2.4 1 2-3.4-2.1-1.6c.1-.45.15-.9.15-1.4Z"/></svg><span>Configurações</span></button>
    <div class="spacer"></div>
    <button class="nav-btn foot-btn" onclick="logout()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><span>Sair</span></button>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <div class="crumb" id="crumb">Dashboard</div>
        <h1 id="pageTitle">Visão geral</h1>
      </div>
      <div class="row">
        <span class="tag-admin adminOnly" style="display:none">MODO AGÊNCIA</span>
        <div class="seg" id="periodSeg">
          <button data-p="6" class="active" onclick="setPeriod('6')">6 meses</button>
          <button data-p="12" onclick="setPeriod('12')">12 meses</button>
          <button data-p="all" onclick="setPeriod('all')">Tudo</button>
        </div>
      </div>
    </div>
    <div id="view"></div>
    <footer id="foot"></footer>
  </main>
</div>

<!-- Modal genérico -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
/* ============================================================
   SEVILA CREATIVE STUDIO — Lógica
   - Persistência: window.storage (artifact) com fallback em memória
   - Multi-cliente, modo agência (admin) x modo cliente (leitura)
   ============================================================ */

/* ---------- Utilitários ---------- */
const $  = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmt    = n => new Intl.NumberFormat('pt-BR').format(Math.round(n));
const fmtDec = n => new Intl.NumberFormat('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1}).format(n);
const fmtBRL = n => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n);
const MESES  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MESES3 = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DOW    = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const HOJE   = new Date();
const uid    = () => Math.random().toString(36).slice(2,10);
const esc    = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function loadDB(){
  // 1º: armazenamento do artifact (quando aberto dentro do Claude)
  try{
    if(window.storage){
      const r = await window.storage.get('sevilahub:v1');
      if(r && r.value) DB = JSON.parse(r.value);
    }
  }catch(e){ /* chave não existe ainda */ }
  // 2º: localStorage do navegador (quando hospedado, ex.: GitHub Pages)
  if(!DB){ try{ const ls = localStorage.getItem('sevilahub:v1'); if(ls) DB = JSON.parse(ls); }catch(e){} }
  // 3º: dados embutidos na publicação (o que o cliente vê ao abrir o link)
  if(!DB && EMBEDDED_DB){ DB = JSON.parse(JSON.stringify(EMBEDDED_DB)); }
  // 4º: demonstração
  if(!DB){ DB = seed(); }
  saveDB();
}
async function saveDB(){
  let ok = false;
  try{ if(window.storage){ await window.storage.set('sevilahub:v1', JSON.stringify(DB)); ok = true; } }catch(e){}
  try{ localStorage.setItem('sevilahub:v1', JSON.stringify(DB)); ok = true; }catch(e){}
  storageOk = ok;
  if(!ok) console.warn('Persistência indisponível — dados apenas em memória.');
}

/* ---------- Dados derivados ---------- */
function sortedReportKeys(){ return Object.keys(client().reports).sort(); }
function filteredKeys(){
  const ks = sortedReportKeys();
  if(period==='all') return ks;
  return ks.slice(-parseInt(period));
}
function latestReport(){
  const ks=sortedReportKeys(); if(!ks.length) return null;
  return {key:ks[ks.length-1], prevKey:ks[ks.length-2]||null,
          data:client().reports[ks[ks.length-1]],
          prev: ks.length>1 ? client().reports[ks[ks.length-2]] : null};
}
function monthPosts(mk){ return client().posts.filter(p=>p.date.startsWith(mk)); }
function deltaHTML(cur,prev,suffix=''){
  if(prev==null||prev===0) return '<span class="delta flat">—</span>';
  const d=((cur-prev)/prev)*100, cls=d>0.05?'up':(d<-0.05?'down':'flat'), arrow=d>0.05?'▲':(d<-0.05?'▼':'•');
  return `<span class="delta ${cls}">${arrow} ${fmtDec(Math.abs(d))}% vs mês anterior</span>`;
}

  charts.seg=new Chart(ctx1,{type:'line',data:{labels,datasets:[{data:seg,borderColor:'#7C3AED',

    pointBorderColor:'#7C3AED',pointBorderWidth:2.5,pointHoverRadius:6}]},options:baseOpts(v=>fmt(v)+' seguidores')});

  // Barras: alcance
  const ctx2=$('#chAlc').getContext('2d');
  const g2=ctx2.createLinearGradient(0,0,0,250);
  g2.addColorStop(0,'#A855F7'); g2.addColorStop(1,'#6C2BD9');
  charts.alc=new Chart(ctx2,{type:'bar',data:{labels,datasets:[{data:alc,backgroundColor:g2,
    hoverBackgroundColor:'#D946EF',borderRadius:9,maxBarThickness:44}]},options:baseOpts(v=>fmt(v)+' contas alcançadas')});

  // Rosca: mix de formatos
  const mix={}; c.posts.forEach(p=>mix[p.type]=(mix[p.type]||0)+1);

  charts.mix=new Chart($('#chMix'),{type:'doughnut',data:{labels:mkeys.map(k=>TIPOS[k].label),
    datasets:[{data:mkeys.map(k=>mix[k]),backgroundColor:mkeys.map(k=>TIPOS[k].color),borderWidth:3,borderColor:'#fff',hoverOffset:8}]},

  $('#insMix').innerHTML= top?`💡 <b>${TIPOS[top].label}</b> é o formato mais presente no calendário (${mix[top]} conteúdos).`:'Adicione conteúdos ao calendário.';
}

function tt(fmtFn){
  return {backgroundColor:'#1D1040',titleFont:{family:'Sora',size:12},bodyFont:{family:'Inter',size:12},
    padding:12,cornerRadius:10,displayColors:false,
    callbacks:{label:ctx=>fmtFn(ctx.parsed.y??ctx.parsed)}};
}
function baseOpts(fmtFn){
  return {responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:tt(fmtFn)},
    scales:{x:{grid:{display:false},ticks:{font:{family:'Inter',size:11.5},color:'#6E6588'}},
      y:{grid:{color:'#EFEAFB'},border:{display:false},ticks:{font:{family:'Inter',size:11.5},color:'#6E6588',
        callback:v=>fmt(v)}}}};
}

function renderCal(){
  const y=calCursor.getFullYear(), m=calCursor.getMonth();
  const first=new Date(y,m,1), start=first.getDay(), days=new Date(y,m+1,0).getDate();
  const mk=`${y}-${String(m+1).padStart(2,'0')}`;
  const posts=monthPosts(mk);

  let cells = DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<start;i++) cells+=`<div class="cal-cell out"></div>`;
  for(let d=1;d<=days;d++){
    const dk=`${mk}-${String(d).padStart(2,'0')}`;
    const isToday = dk===`${monthKey(HOJE)}-${String(HOJE.getDate()).padStart(2,'0')}`;
    const dayPosts=posts.filter(p=>p.date===dk);
    cells+=`<div class="cal-cell ${isToday?'today':''}"><span class="d">${d}</span>
      ${dayPosts.map(p=>`<div class="pill" style="background:${TIPOS[p.type].color}" onclick="openPost('${p.id}')" title="${esc(p.title)}">
        <i class="st" style="background:${STATUS[p.status].color}"></i><span>${esc(p.title.length>26?p.title.slice(0,25)+'…':p.title)}</span></div>`).join('')}
      ${isAdmin()?`<div class="pill" style="background:#EFEAFB;color:#7C3AED;justify-content:center" onclick="openPost(null,'${dk}')">+ novo</div>`:''}
    </div>`;
  }

  const done=posts.filter(p=>p.status==='postado').length;
  $('#view').innerHTML=`
    <div class="card rise">
      <div class="cal-head">
        <h2>${MESES[m]} ${y} <span class="sub" style="font-family:Inter;font-weight:500">· ${posts.length} conteúdos · ${done} postados</span></h2>
        <div class="cal-nav">
          <button class="icon-btn" onclick="navCal(-1)">‹</button>
          <button class="btn ghost sm" onclick="calCursor=new Date(HOJE.getFullYear(),HOJE.getMonth(),1);renderCal()">Hoje</button>
          <button class="icon-btn" onclick="navCal(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">${cells}</div>
      <div class="legend">
        ${Object.values(TIPOS).map(t=>`<span><i style="background:${t.color}"></i>${t.label}</span>`).join('')}
        <span style="margin-left:auto">Bolinha no conteúdo = status:</span>
        ${Object.values(STATUS).map(s=>`<span><i style="background:${s.color};border-radius:50%"></i>${s.label}</span>`).join('')}
      </div>
    </div>`;
}
function navCal(dir){ calCursor=new Date(calCursor.getFullYear(),calCursor.getMonth()+dir,1); renderCal(); }

    <div class="field"><label>Legenda / observações</label><textarea id="pCap" placeholder="Legenda, CTA, hashtags…">${p?esc(p.caption):''}</textarea></div>
    <div class="row" style="justify-content:flex-end">
      ${p?`<button class="btn danger" onclick="delPost('${p.id}')">Excluir</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn violet" onclick="savePost('${p?p.id:''}')">Salvar</button>
    </div>`);
}
function savePost(id){
  const targetId = $('#pClient') ? $('#pClient').value : session.clientId;
  const data={date:$('#pDate').value,title:$('#pTitle').value.trim(),type:$('#pType').value,
    status:$('#pStatus').value,platform:$('#pPlat').value,
    objetivo:$('#pObj').value.trim(),explicacao:$('#pExp').value.trim(),
    caption:$('#pCap').value.trim()};
  if(!data.date||!data.title) return alert('Preencha data e título.');
  if(id){
    // localiza o cliente dono do post; se o cliente foi trocado, move o conteúdo
    const owner = Object.values(DB.clients).find(c=>c.posts.some(p=>p.id===id));
    if(owner && owner.id!==targetId){
      owner.posts = owner.posts.filter(p=>p.id!==id);
      DB.clients[targetId].posts.push({id,...data});
    } else if(owner){
      Object.assign(owner.posts.find(p=>p.id===id),data);
    }
  } else {
    DB.clients[targetId].posts.push({id:uid(),...data});
  }
  saveDB(); closeModal(); renderCal();
}
function delPost(id){
  if(!confirm('Excluir este conteúdo?')) return;
  const c=client(); c.posts=c.posts.filter(p=>p.id!==id);
  saveDB(); closeModal(); renderCal();
}

/* ============================================================
   ANÁLISE DO PERFIL
   ============================================================ */
function renderAn(){
  const items=client().analysis;
  const avg=items.length? items.reduce((s,i)=>s+i.score,0)/items.length : 0;
  $('#view').innerHTML=`
    <div class="card rise" style="display:flex;align-items:center;gap:26px;flex-wrap:wrap;margin-bottom:20px">
      <div>
        <div class="kpi"><div class="lbl">Nota geral do perfil</div>
        <div class="val" style="font-size:44px;background:linear-gradient(90deg,#7C3AED,#D946EF);-webkit-background-clip:text;background-clip:text;color:transparent">${fmtDec(avg)}<span style="font-size:20px;color:#B9B0D4"> / 10</span></div></div>
        <div class="sub">Média das ${items.length} áreas avaliadas pela agência</div>
      </div>
      <div style="flex:1;min-width:220px"><div class="progress" style="height:12px"><i style="width:${avg*10}%"></i></div>
        <div class="sub" style="margin-top:8px">Itens marcados como <b style="color:#B91C1C">prioridade alta</b> são o foco do próximo ciclo.</div></div>
      ${isAdmin()?`<button class="btn violet" onclick="openAnItem()">+ Novo ponto de análise</button>`:''}
    </div>
    <div class="an-grid">
      ${items.map((i,idx)=>`
        <div class="card an-card hoverable rise" style="animation-delay:${idx*0.05}s">
          <div class="top"><h3>${esc(i.area)}</h3><span class="badge ${i.prio}">${i.prio==='alta'?'Prioridade alta':i.prio==='media'?'Prioridade média':'Manter'}</span></div>
          <div class="row" style="margin-top:12px"><span class="score">${i.score}/10</span>
            <div class="progress" style="flex:1;margin-top:0"><i style="width:${i.score*10}%"></i></div></div>
          <p class="txt">${esc(i.txt)}</p>
          ${isAdmin()?`<div class="row mt"><button class="btn ghost sm" onclick="openAnItem('${i.id}')">Editar</button>
            <button class="btn danger sm" onclick="delAn('${i.id}')">Excluir</button></div>`:''}
        </div>`).join('') || `<div class="card empty">Nenhum ponto de análise cadastrado ainda.</div>`}
    </div>`;
}
function openAnItem(id){
  const i=id?client().analysis.find(x=>x.id===id):null;
  modal(`<h3>${i?'Editar análise':'Novo ponto de análise'}</h3>
    <div class="field"><label>Área avaliada</label><input id="aArea" value="${i?esc(i.area):''}" placeholder="Ex.: Frequência de postagem"></div>
    <div class="form-2">
      <div class="field"><label>Nota (0–10)</label><input type="number" id="aScore" min="0" max="10" value="${i?i.score:7}"></div>
      <div class="field"><label>Prioridade</label><select id="aPrio">
        <option value="alta" ${i&&i.prio==='alta'?'selected':''}>Alta</option>
        <option value="media" ${i&&i.prio==='media'?'selected':''}>Média</option>
        <option value="baixa" ${i&&i.prio==='baixa'?'selected':''}>Baixa / manter</option></select></div>
    </div>
    <div class="field"><label>Diagnóstico e recomendação</label><textarea id="aTxt">${i?esc(i.txt):''}</textarea></div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn violet" onclick="saveAn('${i?i.id:''}')">Salvar</button></div>`);
}
function saveAn(id){
  const data={area:$('#aArea').value.trim(),score:Math.min(10,Math.max(0,+$('#aScore').value||0)),
    prio:$('#aPrio').value,txt:$('#aTxt').value.trim()};
  if(!data.area) return alert('Informe a área avaliada.');
  if(id) Object.assign(client().analysis.find(x=>x.id===id),data);
  else client().analysis.push({id:uid(),...data});
  saveDB(); closeModal(); renderAn();
}
function delAn(id){ if(!confirm('Excluir este item?'))return;
  const c=client(); c.analysis=c.analysis.filter(x=>x.id!==id); saveDB(); renderAn(); }

/* ============================================================
   RELATÓRIO MENSAL
   ============================================================ */
function renderRep(){
  const c=client(), ks=filteredKeys().slice().reverse(), lr=latestReport();
  $('#view').innerHTML=`
    ${lr&&lr.data.notas?`<div class="card rise" style="margin-bottom:20px;border-left:4px solid #A855F7">
      <h3>Resumo do mês — ${labelMK(lr.key)}</h3><p class="sub" style="margin-top:8px;line-height:1.65;font-size:13.5px">${esc(lr.data.notas)}</p></div>`:''}
    <div class="card rise" style="margin-bottom:20px">
      <div class="row" style="justify-content:space-between">
        <div><h3>Histórico mensal</h3><div class="sub">Base de dados que alimenta o dashboard</div></div>
        ${isAdmin()?`<button class="btn violet" onclick="openRep()">+ Adicionar mês</button>`:''}
      </div>
      <div style="overflow-x:auto;margin-top:14px"><table>
        <thead><tr><th>Mês</th><th>Seguidores</th><th>Alcance</th><th>Impressões</th><th>Engajamento</th><th>Publicações</th>${isAdmin()?'<th></th>':''}</tr></thead>
        <tbody>${ks.map(k=>{const r=c.reports[k];return `<tr>
          <td style="font-weight:700;text-transform:capitalize">${labelMK(k)}</td>
          <td class="num">${fmt(r.seguidores)}</td><td class="num">${fmt(r.alcance)}</td>
          <td class="num">${fmt(r.impressoes)}</td><td class="num">${fmtDec(r.engajamento)}%</td>
          <td class="num">${fmt(r.publicacoes)}</td>
          ${isAdmin()?`<td><button class="btn ghost sm" onclick="openRep('${k}')">Editar</button></td>`:''}</tr>`;}).join('')
          || `<tr><td colspan="7" class="empty">Nenhum relatório ainda.</td></tr>`}</tbody>
      </table></div>
    </div>
    <div class="card hoverable rise">
      <h3>Engajamento (%)</h3><div class="sub">Taxa média de interação por mês</div>
      <div class="chart-box"><canvas id="chEng"></canvas></div>
      <div class="insight" id="insEng"></div>
    </div>`;

  const fks=filteredKeys(), eng=fks.map(k=>c.reports[k].engajamento);
  const ctx=$('#chEng').getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,250);
  g.addColorStop(0,'rgba(217,70,239,.3)'); g.addColorStop(1,'rgba(217,70,239,.02)');
  charts.eng=new Chart(ctx,{type:'line',data:{labels:fks.map(labelMK),datasets:[{data:eng,
    borderColor:'#D946EF',backgroundColor:g,fill:true,tension:.42,pointRadius:4,
    pointBackgroundColor:'#fff',pointBorderColor:'#D946EF',pointBorderWidth:2.5,pointHoverRadius:6}]},
    options:(()=>{const o=baseOpts(v=>fmtDec(v)+'% de engajamento');o.scales.y.ticks.callback=v=>fmtDec(v)+'%';return o;})()});
  if(eng.length>1){
    const d=eng.at(-1)-eng[0];
    $('#insEng').innerHTML=`💡 Engajamento ${d>=0?'subiu':'caiu'} <b>${fmtDec(Math.abs(d))} p.p.</b> no período — ${d>=0?'sinal de comunidade mais ativa.':'vale revisar formatos e horários.'}`;
  } else $('#insEng').innerHTML='Adicione mais meses para acompanhar a tendência.';
}
function openRep(key){
  const r=key?client().reports[key]:null;
  modal(`<h3>${key?'Editar relatório · '+labelMK(key):'Novo relatório mensal'}</h3>
    <div class="form-2">
      <div class="field"><label>Mês</label><input type="month" id="rMonth" value="${key||monthKey(HOJE)}" ${key?'disabled':''}></div>
      <div class="field"><label>Seguidores</label><input type="number" id="rSeg" value="${r?r.seguidores:''}"></div>
      <div class="field"><label>Alcance</label><input type="number" id="rAlc" value="${r?r.alcance:''}"></div>
      <div class="field"><label>Impressões</label><input type="number" id="rImp" value="${r?r.impressoes:''}"></div>
      <div class="field"><label>Engajamento (%)</label><input type="number" step="0.1" id="rEng" value="${r?r.engajamento:''}"></div>
      <div class="field"><label>Publicações</label><input type="number" id="rPub" value="${r?r.publicacoes:''}"></div>
    </div>
    <div class="field"><label>Resumo / observações do mês</label><textarea id="rNotas">${r?esc(r.notas):''}</textarea></div>
    <div class="row" style="justify-content:flex-end">
      ${key?`<button class="btn danger" onclick="delRep('${key}')">Excluir</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn violet" onclick="saveRep('${key||''}')">Salvar</button></div>`);
}
function saveRep(key){
  const k=key||$('#rMonth').value;
  if(!k) return alert('Informe o mês.');
  client().reports[k]={seguidores:+$('#rSeg').value||0,alcance:+$('#rAlc').value||0,
    impressoes:+$('#rImp').value||0,engajamento:+$('#rEng').value||0,
    publicacoes:+$('#rPub').value||0,notas:$('#rNotas').value.trim()};
  saveDB(); closeModal(); renderRep();
}
function delRep(key){ if(!confirm('Excluir o relatório de '+labelMK(key)+'?'))return;
  delete client().reports[key]; saveDB(); closeModal(); renderRep(); }

/* ============================================================
   GESTÃO DE CLIENTES (admin) — criar, replicar, alternar
   ============================================================ */
function renderCli(){
  $('#view').innerHTML=`
    <div class="row" style="justify-content:space-between;margin-bottom:20px">
      <p class="sub" style="max-width:520px;line-height:1.6">Crie um cliente do zero ou <b>replique a estrutura</b> de um existente (calendário, análise e relatórios são copiados como ponto de partida).</p>
      <button class="btn violet" onclick="openClient()">+ Novo cliente</button>
    </div>
    <div class="an-grid">
      ${Object.values(DB.clients).map((c,i)=>`
        <div class="card hoverable rise" style="animation-delay:${i*0.05}s;${c.id===session.clientId?'box-shadow:var(--glow)':''}">
          <div class="top" style="display:flex;justify-content:space-between;align-items:center">
            <div><h3>${esc(c.name)}</h3><div class="sub">${esc(c.handle)} · código: <b>${esc(c.code)}</b></div></div>
            ${c.id===session.clientId?'<span class="badge" style="background:#EDE4FF;color:#6C2BD9">Ativo</span>':''}
          </div>
          <div class="sub" style="margin-top:10px">${c.posts.length} conteúdos · ${Object.keys(c.reports).length} relatórios · ${c.analysis.length} análises</div>
          <div class="row mt">
            <button class="btn violet sm" onclick="switchClient('${c.id}')">Abrir</button>
            <button class="btn ghost sm" onclick="dupClient('${c.id}')">Replicar</button>
            <button class="btn ghost sm" onclick="openClient('${c.id}')">Editar</button>
            ${Object.keys(DB.clients).length>1?`<button class="btn danger sm" onclick="delClient('${c.id}')">Excluir</button>`:''}
          </div>
        </div>`).join('')}
    </div>`;
}
function switchClient(id){ session.clientId=id; refreshSidebar(); go('dash'); }
function dupClient(id){
  const src=DB.clients[id], nid=uid();
  DB.clients[nid]=JSON.parse(JSON.stringify(src));
  Object.assign(DB.clients[nid],{id:nid,name:src.name+' (cópia)',handle:'@novocliente',code:'acesso'+Math.floor(Math.random()*900+100)});
  DB.clients[nid].posts.forEach(p=>{p.id=uid();p.status='planejado';});
  saveDB(); renderCli();
}
function openClient(id){
  const c=id?DB.clients[id]:null;
  modal(`<h3>${c?'Editar cliente':'Novo cliente'}</h3>
    <div class="field"><label>Nome do cliente</label><input id="cName" value="${c?esc(c.name):''}" placeholder="Ex.: Studio Bela Pele"></div>
    <div class="form-2">
      <div class="field"><label>@ / handle</label><input id="cHandle" value="${c?esc(c.handle):''}" placeholder="@studiobela"></div>
      <div class="field"><label>Código de acesso do cliente</label><input id="cCode" value="${c?esc(c.code):''}" placeholder="Ex.: bela2026"></div>
    </div>
    <div class="row" style="justify-content:flex-end">
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn violet" onclick="saveClient('${c?c.id:''}')">Salvar</button></div>`);
}
function saveClient(id){
  const data={name:$('#cName').value.trim(),handle:$('#cHandle').value.trim(),code:$('#cCode').value.trim()};
  if(!data.name||!data.code) return alert('Preencha nome e código de acesso.');
  if(id) Object.assign(DB.clients[id],data);
  else { const nid=uid(); DB.clients[nid]={id:nid,...data,posts:[],reports:{},analysis:[]}; }
  saveDB(); closeModal(); refreshSidebar(); renderCli();
}
function delClient(id){
  if(!confirm('Excluir este cliente e todos os seus dados?')) return;
  delete DB.clients[id];
  if(session.clientId===id) session.clientId=Object.keys(DB.clients)[0];
  saveDB(); refreshSidebar(); renderCli();
}

/* ============================================================
   CONFIGURAÇÕES (admin)
   ============================================================ */
function renderCfg(){
  $('#view').innerHTML=`
    <div class="grid two">
      <div class="card rise">
        <h3>Senha da agência</h3><div class="sub">Usada para entrar no modo administrador</div>
        <div class="field mt"><label>Nova senha</label><input type="password" id="newPass" placeholder="Mínimo 6 caracteres"></div>
        <button class="btn violet" onclick="changePass()">Atualizar senha</button>
        <p class="sub mt" id="passMsg"></p>
      </div>
      <div class="card rise" style="animation-delay:.07s">
        <h3>Publicação e dados</h3>
        <p class="sub mt" style="line-height:1.65">
          Suas edições ficam salvas <b>neste navegador</b> automaticamente. Para que os <b>clientes vejam as atualizações</b> no link público, exporte a versão publicável e substitua o arquivo <b>index.html</b> no seu repositório do GitHub (leva menos de 1 minuto).
          <br><br>⚠️ Este sistema é uma página estática: a senha protege a interface, mas não é segurança de nível bancário. Não guarde dados sensíveis aqui.
        </p>
        <div class="row mt">
          <button class="btn violet" onclick="exportPublish()">⬇ Exportar versão para publicar</button>
          <button class="btn danger" onclick="resetAll()">Restaurar demonstração</button>
        </div>
      </div>
    </div>`;
}
function changePass(){
  const p=$('#newPass').value;
  if(p.length<6){ $('#passMsg').textContent='A senha precisa de pelo menos 6 caracteres.'; return; }
  DB.settings.adminPass=p; saveDB();
  $('#passMsg').textContent='✓ Senha atualizada com sucesso.'; $('#newPass').value='';
}
async function resetAll(){
  if(!confirm('Isso apaga TODOS os clientes e restaura a demo. Continuar?')) return;
  DB=seed(); await saveDB(); refreshSidebar(); go('dash');
}

/* ---------- Exportar versão para publicar (GitHub Pages) ---------- */
async function exportPublish(){
  try{
    // Busca o próprio HTML da página e injeta o banco de dados atual
    const res = await fetch(location.href, {cache:'no-store'});
    if(!res.ok) throw new Error('fetch');
    let src = await res.text();
    const json = JSON.stringify(DB).replace(/<\//g, '<\\/'); // evita fechar a tag <script>
    src = src.replace(/\/\*__EMBED_START__\*\/[\s\S]*?\/\*__EMBED_END__\*\//,
                      '/*__EMBED_START__*/' + json + '/*__EMBED_END__*/');
    const blob = new Blob([src], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }catch(e){
    alert('Não foi possível exportar automaticamente neste ambiente.\n\nAbra o sistema pelo seu link público (GitHub Pages) e exporte por lá — ou, se estiver abrindo o arquivo direto do computador, me peça a versão exportada por aqui.');
  }
}

/* ---------- Modal helpers ---------- */
function modal(html){ $('#modalBox').innerHTML=html; $('#modalBg').classList.add('on'); }
function closeModal(){ $('#modalBg').classList.remove('on'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ---------- Boot ---------- */
Chart.defaults.font.family='Inter';
loadDB().then(()=>switchLoginTab('admin'));
</script>
